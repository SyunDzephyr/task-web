<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Task Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f2f2f7" />
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1>Task Manager</h1>
        <p>文章を貼り付けて、タスクを自動で整理</p>
      </header>

      <main class="app-main">
        <!-- 入力エリア -->
        <section class="card">
          <h2>タスク文章入力</h2>
          <div class="textarea-wrapper">
            <textarea id="inputText" placeholder=" "></textarea>
            <div id="inputPlaceholder" class="textarea-placeholder">
              Copilotでまとめた文章を貼り付けてください
            </div>
          </div>

          <button id="parseButton">解析してタスクに追加</button>
        </section>

        <!-- カテゴリ管理 -->
        <section class="card">
          <h2>カテゴリ管理</h2>
          <div class="category-input-row">
            <input
              id="newCategoryInput"
              type="text"
              placeholder="カテゴリ名を追加（例：面談、移動、休息）"
            />
            <button id="addCategoryButton">追加</button>
          </div>
          <ul id="categoryList" class="category-list"></ul>
        </section>

        <!-- タスク一覧 -->
        <section class="card">
          <h2>タスク一覧</h2>

          <div class="task-toolbar">
            <input
              id="searchInput"
              type="text"
              placeholder="タイトル検索（例：面談、ソフトバンク）"
            />
            <button id="selectAllButton">全選択</button>
            <button id="unselectAllButton">選択解除</button>
            <button id="deleteSelectedButton" class="danger">
              選択したタスクを削除
            </button>
          </div>

          <div id="taskList"></div>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
